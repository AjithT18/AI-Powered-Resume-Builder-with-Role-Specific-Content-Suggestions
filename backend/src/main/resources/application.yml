spring:
  application:
    name: eliteresume-api
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ai_resume?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:12345}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

server:
  port: ${PORT:8081}

app:
  frontend-origin: ${FRONTEND_ORIGIN:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-key-change-before-production-32}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  storage:
    resume-dir: ${RESUME_STORAGE_DIR:storage/resumes}
